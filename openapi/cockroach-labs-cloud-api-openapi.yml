        automatic maintenance and version upgrade operations on a cluster.
      properties:
        day_of_week:
          type: integer
          description: Day of the week for maintenance. 0=Sunday, 6=Saturday.
          minimum: 0
          maximum: 6
        start_hour:
          type: integer
          description: Hour of day (UTC) when the maintenance window begins.
          minimum: 0
          maximum: 23

    ClusterVersionDeferral:
      type: object
      description: >-
        Version deferral policy for a cluster, controlling whether automatic
        CockroachDB version upgrades are deferred.
      properties:
        deferral_policy:
          type: string
          description: >-
            Deferral policy. Values include NOT_DEFERRED (upgrades proceed
            immediately) and FIXED_DEFERRAL (upgrades are delayed).
          enum: [NOT_DEFERRED, FIXED_DEFERRAL]

    PaginationResponse:
      type: object
      description: Pagination metadata included in list responses.
      properties:
        next:
          type: string
          description: Token or cursor for retrieving the next page of results.
        last:
          type: string
          description: Token or cursor for the last page of results.
        time:
          type: string
          format: date-time
          description: Server time at which the paginated query was executed.

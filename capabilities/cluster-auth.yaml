naftiko: 1.0.0-alpha2
info:
  label: CockroachDB Cluster API — Auth
  description: 'CockroachDB Cluster API — Auth. 2 operations. Lead operation: Create a session. Self-contained Naftiko capability
    covering one Cockroach Labs business surface.'
  tags:
  - Cockroach Labs
  - Auth
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    COCKROACH_LABS_API_KEY: COCKROACH_LABS_API_KEY
capability:
  consumes:
  - type: http
    namespace: cluster-auth
    baseUri: https://localhost:8080
    description: CockroachDB Cluster API — Auth business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-login
      path: /api/v2/login/
      operations:
      - name: login
        method: POST
        description: Create a session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-v2-logout
      path: /api/v2/logout/
      operations:
      - name: logout
        method: POST
        description: Terminate a session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-Cockroach-API-Session
      value: '{{env.COCKROACH_LABS_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: cluster-auth-rest
    port: 8080
    description: REST adapter for CockroachDB Cluster API — Auth. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/api/v2/login
      name: api-v2-login
      description: REST surface for api-v2-login.
      operations:
      - method: POST
        name: login
        description: Create a session
        call: cluster-auth.login
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v2/logout
      name: api-v2-logout
      description: REST surface for api-v2-logout.
      operations:
      - method: POST
        name: logout
        description: Terminate a session
        call: cluster-auth.logout
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cluster-auth-mcp
    port: 9090
    transport: http
    description: MCP adapter for CockroachDB Cluster API — Auth. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: create-session
      description: Create a session
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: cluster-auth.login
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: terminate-session
      description: Terminate a session
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: cluster-auth.logout
      outputParameters:
      - type: object
        mapping: $.

naftiko: 1.0.0-alpha2
info:
  label: CockroachDB Cloud API — AuditLogs
  description: 'CockroachDB Cloud API — AuditLogs. 1 operations. Lead operation: List audit log events. Self-contained Naftiko
    capability covering one Cockroach Labs business surface.'
  tags:
  - Cockroach Labs
  - AuditLogs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    COCKROACH_LABS_API_KEY: COCKROACH_LABS_API_KEY
capability:
  consumes:
  - type: http
    namespace: cloud-auditlogs
    baseUri: https://cockroachlabs.cloud
    description: CockroachDB Cloud API — AuditLogs business capability. Self-contained, no shared references.
    resources:
    - name: api-v1-auditlogevents
      path: /api/v1/auditlogevents
      operations:
      - name: listauditlogs
        method: GET
        description: List audit log events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: starting_from
          in: query
          type: string
          description: Exclusive timestamp for filtering audit log entries by creation time.
        - name: sort_order
          in: query
          type: string
          description: Pagination direction. Accepted values are ASC and DESC.
        - name: limit
          in: query
          type: integer
          description: Number of entries to return per page.
    authentication:
      type: bearer
      token: '{{env.COCKROACH_LABS_API_KEY}}'
  exposes:
  - type: rest
    namespace: cloud-auditlogs-rest
    port: 8080
    description: REST adapter for CockroachDB Cloud API — AuditLogs. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/api/v1/auditlogevents
      name: api-v1-auditlogevents
      description: REST surface for api-v1-auditlogevents.
      operations:
      - method: GET
        name: listauditlogs
        description: List audit log events
        call: cloud-auditlogs.listauditlogs
        with:
          starting_from: rest.starting_from
          sort_order: rest.sort_order
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cloud-auditlogs-mcp
    port: 9090
    transport: http
    description: MCP adapter for CockroachDB Cloud API — AuditLogs. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-audit-log-events
      description: List audit log events
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cloud-auditlogs.listauditlogs
      with:
        starting_from: tools.starting_from
        sort_order: tools.sort_order
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.

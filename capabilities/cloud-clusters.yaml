      - name: listclusternodes
        method: GET
        description: List cluster nodes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: region_name
          in: query
          type: string
          description: Filter nodes by the name of the cloud provider region.

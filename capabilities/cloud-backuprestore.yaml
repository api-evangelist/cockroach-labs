        description: List backups
        call: cloud-backuprestore.listbackups
        with:
          start_time: rest.start_time
          end_time: rest.end_time
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v1/clusters/{cluster-id}/backups-config
